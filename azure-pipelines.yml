trigger:
  branches:
    include:
      - dev
      - DEV
      - main
      - master

pr:
  branches:
    include:
      - dev
      - DEV
      - main
      - master

pool:
  vmImage: 'windows-latest'

variables:
  BuildConfiguration: 'Release'
  DotNetSdk8: '8.0.x'
  PythonVersion: '3.12'
  TerraformVersion: '1.6.6'
  NuGetVulnerabilityThreshold: 'Critical'
  TimestampUrl: 'http://timestamp.sectigo.com'

stages:
- stage: ProductGates
  displayName: "Product gates"
  jobs:
  - job: Gates
    displayName: "Build, tests and security gates"
    steps:
    - checkout: self
      fetchDepth: 0

    - task: UseDotNet@2
      displayName: "Use .NET SDK 8"
      inputs:
        packageType: 'sdk'
        version: '$(DotNetSdk8)'

    - task: UsePythonVersion@0
      displayName: "Use Python $(PythonVersion)"
      inputs:
        versionSpec: '$(PythonVersion)'

    - task: TerraformInstaller@1
      displayName: "Use Terraform $(TerraformVersion)"
      inputs:
        terraformVersion: '$(TerraformVersion)'

    - pwsh: >
        ./scripts/ci/Invoke-SecretScan.ps1
        -Root "$(Build.SourcesDirectory)"
      displayName: "Gate: secret scan"

    - pwsh: >
        ./scripts/ci/Test-NuGetVulnerabilities.ps1
        -Root "$(Build.SourcesDirectory)"
        -MinimumSeverity "$(NuGetVulnerabilityThreshold)"
      displayName: "Gate: NuGet vulnerable packages"

    - pwsh: >
        ./scripts/ci/Invoke-ProductGates.ps1
        -Root "$(Build.SourcesDirectory)"
        -BuildConfiguration "$(BuildConfiguration)"
        -TestResultsDirectory "$(Agent.TempDirectory)/TestResults"
      displayName: "Gate: product build and tests"

    - task: PublishTestResults@2
      displayName: "Publish test results"
      condition: always()
      inputs:
        testResultsFormat: 'VSTest'
        testResultsFiles: '**/*.trx'
        searchFolder: '$(Agent.TempDirectory)/TestResults'
        failTaskOnFailedTests: true

- stage: Package
  displayName: "Package signed artifacts"
  dependsOn: ProductGates
  condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
  jobs:
  - job: BuildArtifacts
    displayName: "Publish agent, updater and webhook"
    variables:
      - group: VG_PfxPassword
    steps:
    - checkout: self
      fetchDepth: 0

    - task: UseDotNet@2
      displayName: "Use .NET SDK 8"
      inputs:
        packageType: 'sdk'
        version: '$(DotNetSdk8)'

    - pwsh: >
        dotnet publish AutoInventario.csproj
        -c "$(BuildConfiguration)"
        -r win-x64
        --self-contained false
        -o "$(Build.ArtifactStagingDirectory)/agent"
      displayName: "Publish agent"

    - pwsh: >
        dotnet publish AutoInventario.Updater/AutoInventario.Updater.csproj
        -c "$(BuildConfiguration)"
        -r win-x64
        --self-contained false
        -o "$(Build.ArtifactStagingDirectory)/updater"
      displayName: "Publish updater"

    - pwsh: >
        dotnet publish Webhook/Webhook-Inventario.csproj
        -c "$(BuildConfiguration)"
        -o "$(Build.ArtifactStagingDirectory)/webhook"
      displayName: "Publish webhook"

    - task: DownloadSecureFile@1
      name: SignCert
      displayName: "Download signing certificate"
      inputs:
        secureFile: '$(SigningCertificateSecureFile)'

    - pwsh: >
        ./scripts/ci/New-ReleaseArtifacts.ps1
        -AgentPublishDir "$(Build.ArtifactStagingDirectory)/agent"
        -UpdaterPublishDir "$(Build.ArtifactStagingDirectory)/updater"
        -WebhookPublishDir "$(Build.ArtifactStagingDirectory)/webhook"
        -BaseUrl "$(baseURL)"
        -SigningCertificatePath "$(SignCert.secureFilePath)"
      displayName: "Sign binaries and generate update manifest"
      env:
        PFX_PASSWORD: $(PfxPassword)
        TIMESTAMP_URL: $(TimestampUrl)

    - task: PublishPipelineArtifact@1
      displayName: "Publish artifact: agent"
      inputs:
        targetPath: '$(Build.ArtifactStagingDirectory)/agent'
        artifact: 'agent'

    - task: PublishPipelineArtifact@1
      displayName: "Publish artifact: updater"
      inputs:
        targetPath: '$(Build.ArtifactStagingDirectory)/updater'
        artifact: 'updater'

    - task: PublishPipelineArtifact@1
      displayName: "Publish artifact: webhook"
      inputs:
        targetPath: '$(Build.ArtifactStagingDirectory)/webhook'
        artifact: 'webhook'
